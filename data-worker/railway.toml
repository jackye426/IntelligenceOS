# Railway Railpack (default). Root Directory = data-worker.
[build]
builder = "RAILPACK"

[deploy]
# playwright is in requirements.txt; install Chromium at boot (non-fatal if it fails).
startCommand = "sh -c 'python -m playwright install chromium || echo playwright-browser-install-skipped; python main.py'"
restartPolicyType = "ON_FAILURE"
